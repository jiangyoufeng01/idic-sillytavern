<div class="idic-companion-settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>IDIC Companion</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            <div class="idic-companion-settings-grid">
                <label class="idic-companion-settings-field">
                    <span>Bridge URL</span>
                    <input id="idic-companion-bridge-url" type="text" placeholder="https://YOUR-PROJECT.functions.supabase.co/idic-companion-bridge" />
                </label>
                <label class="idic-companion-settings-field">
                    <span>Bridge Token (optional)</span>
                    <input id="idic-companion-bridge-token" type="password" placeholder="Optional shared token" />
                </label>
                <label class="idic-companion-settings-field">
                    <span>IDIC Main API URL</span>
                    <input id="idic-companion-api-url" type="text" placeholder="https://api.openai.com/v1" />
                </label>
                <label class="idic-companion-settings-field">
                    <span>IDIC Main API Key</span>
                    <input id="idic-companion-api-key" type="password" placeholder="Used for companion replies and optional summaries" />
                </label>
                <label class="idic-companion-settings-field">
                    <span>IDIC Main Model</span>
                    <input id="idic-companion-api-model" type="text" placeholder="gpt-4.1-mini / your main chat model" />
                </label>
                <label class="idic-companion-settings-field">
                    <span>API Temperature</span>
                    <input id="idic-companion-api-temperature" type="number" min="0" max="2" step="0.05" />
                </label>
                <label class="idic-companion-settings-field">
                    <span>Recent Full Turns</span>
                    <input id="idic-companion-recent-full-turns" type="number" min="1" max="6" />
                </label>
                <label class="idic-companion-settings-field">
                    <span>Rollup Size</span>
                    <input id="idic-companion-rollup-size" type="number" min="5" max="60" />
                </label>
                <label class="idic-companion-settings-field">
                    <span>Max Full Turn Chars</span>
                    <input id="idic-companion-max-turn-chars" type="number" min="800" max="12000" step="100" />
                </label>
                <label class="idic-companion-settings-field">
                    <span>Max Transcript Turns</span>
                    <input id="idic-companion-max-transcript-turns" type="number" min="4" max="40" />
                </label>
            </div>

            <label class="idic-companion-settings-field">
                    <span>Status Bar Selectors</span>
                    <textarea id="idic-companion-status-selectors" rows="5" placeholder=".status-bar&#10;[data-status-bar]&#10;.mes_status"></textarea>
            </label>

            <label class="idic-companion-settings-field idic-companion-settings-check">
                <input id="idic-companion-auto-summary-toggle" type="checkbox" />
                <span>When a turn has no built-in summary module, let the bridge auto-generate one.</span>
            </label>

            <div class="idic-companion-settings-actions">
                <button id="idic-companion-open-panel" class="menu_button">Open Companion Panel</button>
            </div>

            <p class="idic-companion-settings-note">
                The bridge token and main API key are stored client-side by SillyTavern. Treat them as convenience-only, not as strong secret storage.
            </p>
        </div>
    </div>
</div>
